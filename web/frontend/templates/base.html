<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Duck Egg Fertility Detection{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet" />
  {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">Duck Egg Fertility</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/upload' %}active{% endif %}" href="/upload">Prediksi</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/batch' %}active{% endif %}" href="/batch">Prediksi Batch</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/analysis' %}active{% endif %}" href="/analysis">Analisis</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">Riwayat</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/dataset' %}active{% endif %}" href="/dataset">Dataset</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/retrain' %}active{% endif %}" href="/retrain">Retrain</a></li>
        <li class="nav-item"><a class="nav-link {% if request.path == '/admin' %}active{% endif %}" href="/admin">Admin</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid py-4 px-4 flex-grow-1">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 border-top">
  <small>Duck Egg Fertility Detection System &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
