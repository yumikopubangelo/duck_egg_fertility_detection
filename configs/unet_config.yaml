advanced:
  distributed: false
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  mixed_precision: false
  multi_gpu: false
  resume: false
  resume_checkpoint: ''
data:
  image_size:
  - 64
  - 64
  num_workers: 4
  pin_memory: true
  test_fertile_dir: ./data/preprocessed/test/fertile
  test_infertile_dir: ./data/preprocessed/test/infertile
  train_fertile_dir: ./data/preprocessed/train/fertile
  train_infertile_dir: ./data/preprocessed/train/infertile
  val_fertile_dir: ./data/preprocessed/val/fertile
  val_infertile_dir: ./data/preprocessed/val/infertile
evaluation:
  batch_size: 8
  log_dir: ./results/unet_evaluation_logs
  n_visualization_samples: 10
  num_workers: 2
  output_dir: ./results/unet_evaluation
  visualize_predictions: true
model:
  bilinear: true
  dropout_rate: 0.3
  lightweight: true
  n_channels: 3
  n_classes: 1
training:
  batch_size: 8
  checkpoint_interval: 10
  early_stopping_patience: 15
  learning_rate: 0.001
  log_dir: ./results/unet_logs
  loss_type: dice
  lr_patience: 5
  lr_reduce_factor: 0.5
  num_epochs: 1
  output_dir: ./results/unet_training
  seed: 42
  weight_decay: 0.0001
