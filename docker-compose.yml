# =============================================================
#  Duck Egg Fertility Detection — Docker Compose
#  Andi Nur Rachman — Universitas Udayana PhD
# =============================================================
#
#  Services:
#    web        -> Flask REST API         :5000
#    streamlit  -> Streamlit dashboard    :8501
#    worker     -> Celery background jobs
#    db         -> PostgreSQL 15          :5432
#    redis      -> Redis 7 (cache/broker) :6379
#    pgadmin    -> pgAdmin 4              :5050
#    nginx      -> Reverse proxy          :80 / :443
#
#  Usage:
#    cp .env.example .env          # isi SECRET_KEY, DB_PASSWORD, dll.
#    docker compose up --build -d
#    docker compose logs -f web
# =============================================================

name: duck-egg-fertility

# ----------------------------------------------------------------
# Reusable YAML anchors
# ----------------------------------------------------------------

x-app-build: &app-build
  build:
    context: .
    dockerfile: deployment/Dockerfile

x-app-env: &app-env
  env_file:
    - .env
  environment:
    PYTHONPATH: /app
    FLASK_APP: web.api.app:app
    DATABASE_URL: postgresql://duck:${DB_PASSWORD:-duckpassword}@db:5432/duckdb
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    UPLOAD_FOLDER: /app/data/uploads
    MODEL_FOLDER: /app/models

x-app-volumes: &app-volumes
  volumes:
    - ./data:/app/data
    - ./models:/app/models
    - ./logs:/app/logs

x-depends-ready: &depends-ready
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

# ----------------------------------------------------------------
# Services
# ----------------------------------------------------------------

services:

  # -- Flask REST API -------------------------------------------
  web:
    <<: [*app-build, *app-env, *app-volumes, *depends-ready]
    container_name: duck_web
    command:
      - gunicorn
      - --bind=0.0.0.0:5000
      - --workers=4
      - --threads=2
      - --timeout=120
      - --access-logfile=/app/logs/gunicorn-access.log
      - --error-logfile=/app/logs/gunicorn-error.log
      - web.api.app:app
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - frontend

  # -- Streamlit Dashboard --------------------------------------
  streamlit:
    <<: [*app-build, *app-env, *app-volumes, *depends-ready]
    container_name: duck_streamlit
    command:
      - streamlit
      - run
      - web/streamlit_app/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
      - --server.enableCORS=false
      - --server.enableXsrfProtection=false
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - frontend

  # -- Celery Worker --------------------------------------------
  worker:
    <<: [*app-build, *app-env, *app-volumes, *depends-ready]
    container_name: duck_worker
    command:
      - celery
      - -A
      - web.api.app.celery
      - worker
      - --loglevel=info
      - --concurrency=2
      - --logfile=/app/logs/celery-worker.log
    restart: unless-stopped
    networks:
      - internal

  # -- PostgreSQL -----------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: duck_db
    environment:
      POSTGRES_DB: duckdb
      POSTGRES_USER: duck
      POSTGRES_PASSWORD: ${DB_PASSWORD:-duckpassword}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duck -d duckdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # -- Redis ----------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: duck_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # -- pgAdmin --------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: duck_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@duckegg.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - frontend

  # -- Nginx Reverse Proxy --------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: duck_nginx
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/frontend/static:/var/www/static:ro
      - ./web/frontend/templates:/var/www/templates:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
      streamlit:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

# ----------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

# ----------------------------------------------------------------
# Networks
# ----------------------------------------------------------------

networks:
  internal:
    # db, redis, worker -- tidak bisa diakses langsung dari host
    driver: bridge
    internal: true
  frontend:
    # web, streamlit, nginx, pgadmin -- bisa diakses dari host
    driver: bridge
